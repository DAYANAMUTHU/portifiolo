<!-- CONTACT SECTION -->
<section class="container text-center mt-5 mb-5" style="padding-top: 80px;">
  <h2>Get In Touch</h2>
  <p class="mt-3" style="font-size: 1.1rem; color: #b0b0b0;">I'd love to hear from you! Whether you have a question or just want to say hello, feel free to reach out.</p>

  <!-- Contact Form -->
  <div class="row mt-5">
    <div class="col-md-6 offset-md-3">
      <form class="glass p-5" style="box-shadow: 0 10px 40px rgba(0,242,254,0.15);">
        <div class="mb-4">
          <input type="text" class="form-control" placeholder="Your Name" required style="font-size: 1rem;">
        </div>
        <div class="mb-4">
          <input type="email" class="form-control" placeholder="Your Email" required style="font-size: 1rem;">
        </div>
        <div class="mb-4">
          <input type="text" class="form-control" placeholder="Subject" required style="font-size: 1rem;">
        </div>
        <div class="mb-4">
          <textarea class="form-control" rows="6" placeholder="Your Message" required style="font-size: 1rem; resize: none;"></textarea>
        </div>
        <button type="submit" class="btn btn-glow px-5">Send Message</button>
      </form>
    </div>
  </div>

  <!-- Contact Info -->
  <div class="mt-5 glass" style="max-width: 600px; margin: 3rem auto;">
    <h3 style="margin-bottom: 1.5rem;">Other Ways to Connect</h3>
    <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
      <a href="mailto:your.email@example.com" class="btn btn-sm btn-glow">📧 Email</a>
      <a href="https://linkedin.com/in/yourprofile" class="btn btn-sm btn-glow" target="_blank">💼 LinkedIn</a>
      <a href="https://github.com/yourprofile" class="btn btn-sm btn-glow" target="_blank">🐙 GitHub</a>
      <a href="https://twitter.com/yourprofile" class="btn btn-sm btn-glow" target="_blank">𝕏 Twitter</a>
    </div>
  </div>

  <a href="index.html" class="btn btn-glow mt-5 px-5">← Back to Home</a>
</section>
